<!doctype html>
<!--
  ============================================================================
  EXPANDING CARDS - HTML STRUCTURE
  ============================================================================
  Purpose:
    A horizontal row of image panels where clicking a panel expands it and shrinks the others. A common UI pattern seen on portfolio sites, streaming services (e.g., Netflix category hero), and landing pages.

  Design decisions:
    - Background images are applied via inline `style` attributes instead of CSS classes. This is pragmatic when each panel needs a *unique* image and the image set is static; it avoids creating N one-off CSS rules.
      Trade-off: less separation of concerns, but simpler for a fixed demo.
    - Images are hosted on Unsplash's CDN. For production, prefer self-hosted or licensed assets to avoid external dependency and bandwidth concerns.
    - Script is loaded at the end of <body> (not in <head>) so that the DOM is fully parsed before `script.js` runs. This avoids needing `defer` or `DOMContentLoaded` listeners.
  ============================================================================
-->
<html lang="en">
  <head>
    <!-- UTF-8 supports the full Unicode range; standard for modern web pages -->
    <meta charset="UTF-8" />

    <!--
      Viewport meta tag: critical for responsive design on mobile.
      - width=device-width  -> match the device's screen width in CSS pixels
      - initial-scale=1.0   -> no zoom on initial load
      Without this, mobile browsers render at a ~980px virtual viewport and scale down, breaking the @media (max-width: 480px) rule in style.css.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- External stylesheet; loaded before content so panels don't "flash" unstyled -->
    <link rel="stylesheet" href="style.css" />
    <title>Expanding Cards</title>
  </head>
  <body>
    <!--
      .container is the flex parent that holds all panels in a horizontal row.
      Using a single wrapper (instead of styling <body> directly) keeps layout concerns isolated and makes it easy to add siblings (header/footer) later.
    -->
    <div class="container">
      <!--
        Each .panel is an independent flex item.
        The `active` class on the first panel sets the initial expanded state so the page doesn't load with all panels equally sized and no focal point.
        The <h3> inside each panel is the overlay label — hidden by default via CSS (opacity: 0) and revealed only when the panel is active. This keeps the visual noise low on unselected panels.
      -->
      <div
        class="panel active"
        style="
          background-image: url(&quot;https://images.unsplash.com/photo-1558979158-65a1eaa08691?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1350&q=80&quot;);
        "
      >
        <h3>Explore The World</h3>
      </div>
      <div
        class="panel"
        style="
          background-image: url(&quot;https://images.unsplash.com/photo-1572276596237-5db2c3e16c5d?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1350&q=80&quot;);
        "
      >
        <h3>Wild Forest</h3>
      </div>
      <div
        class="panel"
        style="
          background-image: url(&quot;https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1353&q=80&quot;);
        "
      >
        <h3>Sunny Beach</h3>
      </div>
      <div
        class="panel"
        style="
          background-image: url(&quot;https://images.unsplash.com/photo-1551009175-8a68da93d5f9?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1351&q=80&quot;);
        "
      >
        <h3>City on Winter</h3>
      </div>
      <div
        class="panel"
        style="
          background-image: url(&quot;https://images.unsplash.com/photo-1549880338-65ddcdfd017b?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=1350&q=80&quot;);
        "
      >
        <h3>Mountains - Clouds</h3>
      </div>
    </div>

    <!--
      Script placed just before body tag:
        1) Guarantees the DOM (including all .panel elements) exists when document.querySelectorAll runs in script.js.
        2) Doesn't block initial HTML parsing/rendering above it.
      Equivalent alternative: <script src="script.js" defer></script> in <head>.
    -->
    <script src="script.js"></script>
  </body>
</html>
